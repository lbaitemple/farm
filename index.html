<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QQ Farm</title>
<style>
:root {
  --bg1: #1f5b30;
  --bg2: #66a655;
  --panel: rgba(13, 33, 16, 0.56);
  --line: rgba(255, 255, 255, 0.22);
  --txt: #fff8e9;
  --gold: #f5cb3e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--txt);
  background:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,.12), transparent 36%),
    radial-gradient(circle at 82% 82%, rgba(255,220,150,.2), transparent 46%),
    linear-gradient(150deg, var(--bg1), var(--bg2));
  touch-action: manipulation;
}
.shell { max-width: 1200px; margin: 0 auto; padding: 12px; }
.header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 10px;
  background: linear-gradient(180deg, rgba(88,57,21,.82), rgba(67,44,19,.8));
}
.brand { font-size: clamp(18px, 2.7vw, 24px); font-weight: 800; color: var(--gold); }
.player-chip, .gold-chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(0,0,0,.26);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.player-chip { cursor: pointer; }
.actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  border: none;
  border-radius: 10px;
  padding: 8px 10px;
  font-weight: 700;
  cursor: pointer;
  color: var(--txt);
  background: rgba(255,255,255,.16);
}
.btn.active { outline: 2px solid rgba(245,203,62,.75); background: rgba(245,203,62,.24); }
.btn.bluetooth { background: linear-gradient(140deg, #4a9dea, #2a6fbc); }
.btn.bluetooth.connected { background: linear-gradient(140deg, #4ecf76, #2e9450); }
.btn.cloud { background: linear-gradient(140deg, #8a6be0, #5b45b7); }
.btn.admin { background: linear-gradient(140deg, #d9903d, #b7642b); }
.langs { display: flex; gap: 6px; }
.lang-btn { border: none; border-radius: 8px; padding: 6px 8px; background: rgba(255,255,255,.16); color: var(--txt); cursor: pointer; }
.lang-btn.on { background: rgba(245,203,62,.27); outline: 1px solid rgba(245,203,62,.9); }
.main { margin-top: 12px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 12px; }
.panel {
  border: 2px solid var(--line);
  border-radius: 16px;
  background: var(--panel);
}
.farm { padding: 12px; }
.farm-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 9px; }
.farm-title { font-size: 16px; font-weight: 800; }
.farm-body { display: grid; grid-template-columns: 168px minmax(0, 1fr); gap: 10px; align-items: start; }
.farm-meta { display: grid; gap: 4px; }
.leader-panel {
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 12px;
  background: rgba(0,0,0,.16);
  padding: 8px;
}
.leaderboard {
  display: grid;
  gap: 4px;
  max-height: 420px;
  overflow: auto;
}
.leaderboard-label {
  font-size: 11px;
  font-weight: 700;
  opacity: .86;
}
.leader-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  border-radius: 10px;
  padding: 5px 8px;
  background: rgba(0,0,0,.24);
  border: 1px solid rgba(255,255,255,.18);
  cursor: pointer;
}
.leader-row.on {
  background: rgba(245,203,62,.2);
  border-color: rgba(245,203,62,.9);
}
.leader-rank {
  font-weight: 800;
  color: var(--gold);
}
.leader-main {
  min-width: 0;
}
.leader-name {
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.leader-sub {
  font-size: 10px;
  opacity: .82;
}
.weather { font-size: 12px; background: rgba(0,0,0,.24); border-radius: 999px; padding: 5px 10px; }
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.grid-wrap { position: relative; }
.grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; }
.plot {
  aspect-ratio: 1;
  min-height: 70px;
  border-radius: 11px;
  border: 2px solid transparent;
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.plot.empty { background: linear-gradient(130deg, #845923, #a67532); border-color: #6a4619; }
.plot.growing { background: linear-gradient(130deg, #674a31, #845f38); border-color: #4f3821; }
.plot.ready { background: linear-gradient(130deg, #2f8a3f, #47b25a); border-color: #21622c; box-shadow: 0 0 12px rgba(121,238,141,.55); }
.plot.withered { background: linear-gradient(130deg, #643f35, #744942); border-color: #462b25; }
.plot.locked { background: rgba(0,0,0,.2); border-color: rgba(255,255,255,.3); border-style: dashed; cursor: not-allowed; }
.plot-icon { font-size: 28px; }
.plot-time { font-size: 10px; }
.badges { position: absolute; top: 3px; left: 4px; font-size: 11px; }
.progress { position: absolute; bottom: 3px; left: 4px; right: 4px; height: 4px; border-radius: 3px; background: rgba(0,0,0,.34); overflow: hidden; }
.progress > span { display: block; height: 100%; background: linear-gradient(90deg, #8ddd90, #c7f0b5); }
.selector {
  position: absolute;
  width: calc((100% - 32px) / 5);
  height: calc((100% - 32px) / 4);
  border: 2px solid #fbe066;
  border-radius: 11px;
  pointer-events: none;
  box-shadow: 0 0 9px rgba(251,224,102,.68);
  transition: transform 120ms ease;
  z-index: 3;
}
.side { display: grid; gap: 10px; padding: 10px; }
.card { border: 1px solid var(--line); border-radius: 12px; background: rgba(0,0,0,.2); padding: 10px; }
.card h3 { font-size: 13px; margin-bottom: 8px; }
.shop { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.seed { border: 1px solid transparent; border-radius: 10px; background: rgba(255,255,255,.14); padding: 6px; text-align: center; cursor: pointer; }
.seed.on { border-color: rgba(245,203,62,.9); background: rgba(245,203,62,.2); }
.seed .s1 { font-size: 23px; }
.seed .s2 { font-size: 11px; font-weight: 700; }
.seed .s3 { font-size: 10px; opacity: .88; }
.list { display: grid; gap: 6px; max-height: 185px; overflow: auto; }
.friend { border-radius: 10px; border: 1px solid transparent; background: rgba(255,255,255,.12); padding: 6px; display: flex; align-items: center; gap: 7px; cursor: pointer; }
.friend.on { border-color: rgba(245,203,62,.9); background: rgba(245,203,62,.2); }
.friend-main { flex: 1; }
.friend-name { font-size: 12px; font-weight: 700; }
.friend-sub { font-size: 10px; opacity: .8; }
.log { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,.14); padding-bottom: 3px; }
.notice {
  position: fixed;
  top: 84px;
  right: 12px;
  z-index: 130;
  max-width: 300px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,.5);
  background: linear-gradient(140deg, #3f9649, #55ac60);
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 700;
  transform: translateX(130%);
  transition: transform .22s ease;
}
.notice.show { transform: translateX(0); }
.notice.err { background: linear-gradient(140deg, #ad2f32, #ca4d4f); }
.notice.info { background: linear-gradient(140deg, #216ab6, #2f87d5); }
.overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 110; background: rgba(0,0,0,.58); }
.overlay#addModal { z-index: 120; }
.overlay.show { display: flex; }
.modal { width: min(92vw, 360px); border-radius: 14px; border: 2px solid rgba(255,255,255,.35); background: linear-gradient(150deg, #244d2f, #376c41); padding: 14px; }
.modal h2 { margin-bottom: 8px; font-size: 18px; }
.modal input, .modal select {
  width: 100%;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.16);
  color: var(--txt);
  padding: 9px 10px;
  margin: 6px 0;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.admin-grid { display: grid; gap: 6px; }
.admin-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.pending-item {
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  background: rgba(0,0,0,.18);
  padding: 8px;
}
.pending-head { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.pending-actions { display: flex; gap: 6px; }
.hidden { display: none !important; }
.pad {
  display: none;
  position: fixed;
  left: 0;
  right: 0;
  bottom: env(safe-area-inset-bottom, 0);
  z-index: 70;
  padding: 8px;
  background: linear-gradient(180deg, rgba(8,18,9,.15), rgba(8,18,9,.7));
  backdrop-filter: blur(6px);
}
.pad-inner { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.pad-btn { border: none; border-radius: 9px; min-height: 42px; background: rgba(255,255,255,.18); color: var(--txt); font-weight: 700; }
@media (max-width: 980px) { .main { grid-template-columns: 1fr; } }
@media (max-width: 780px) {
  .farm-body { grid-template-columns: 1fr; }
  .grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .selector { width: calc((100% - 26px) / 4); height: calc((100% - 26px) / 5); }
  .pad { display: block; }
  .shell { padding-bottom: calc(95px + env(safe-area-inset-bottom, 0)); }
  .actions { width: 100%; margin-left: 0; }
}
</style>
</head>
<body>
<div id="notice" class="notice"></div>
<div class="shell">
  <div class="header">
    <div id="titleTxt" class="brand">🌱 QQ农场</div>
    <button id="playerBtn" class="player-chip" title="switch player">
      <span id="hdrAvatar">🌾</span>
      <span id="hdrName">Guest</span>
      <span id="hdrLevel">Lv.1</span>
    </button>
    <div class="gold-chip">🪙 <span id="hdrGold">0</span></div>
    <div class="actions">
      <button id="tabMine" class="btn active"></button>
      <button id="tabVisit" class="btn"></button>
      <button id="btBtn" class="btn bluetooth"></button>
      <button id="adminBtn" class="btn admin"></button>
      <button id="logoutBtn" class="btn"></button>
      <div id="langs" class="langs"></div>
    </div>
  </div>

  <div class="main">
    <div class="panel farm">
      <div class="farm-head">
        <div class="farm-meta">
          <div id="farmTitle" class="farm-title"></div>
        </div>
        <div id="weather" class="weather"></div>
      </div>
      <div id="toolbar" class="toolbar"></div>
      <div class="farm-body">
        <div class="leader-panel">
          <div id="topUsersLabel" class="leaderboard-label"></div>
          <div id="topUsers" class="leaderboard"></div>
        </div>
        <div class="grid-wrap">
          <div id="selector" class="selector"></div>
          <div id="grid" class="grid"></div>
        </div>
      </div>
    </div>

    <div class="panel side">
      <div class="card">
        <h3 id="shopTitle"></h3>
        <div id="shop" class="shop"></div>
      </div>
      <div class="card">
        <h3 id="friendsTitle"></h3>
        <div id="friends" class="list"></div>
        <button id="addBtn" class="btn" style="width:100%;margin-top:8px"></button>
      </div>
      <div class="card">
        <h3 id="logTitle"></h3>
        <div id="controlHint" style="font-size:11px;opacity:.86;margin-bottom:8px"></div>
        <div id="log" class="list"></div>
      </div>
    </div>
  </div>
</div>

<div id="pad" class="pad">
  <div class="pad-inner">
    <button class="pad-btn" data-act="left">◀</button>
    <button class="pad-btn" data-act="up">▲</button>
    <button class="pad-btn" data-act="action">A</button>
    <button class="pad-btn" data-act="down">▼</button>
    <button class="pad-btn" data-act="right">▶</button>
  </div>
</div>

<div id="switchModal" class="overlay">
  <div class="modal">
    <h2 id="switchTitle"></h2>
    <div id="switchList" class="list"></div>
    <div class="modal-actions"><button id="switchClose" class="btn"></button></div>
  </div>
</div>

<div id="addModal" class="overlay">
  <div class="modal">
    <h2 id="addTitle"></h2>
    <input id="newName" maxlength="10">
    <input id="newLocation" maxlength="24">
    <input id="newPassword" type="password" autocomplete="off">
    <select id="newAvatar"></select>
    <div class="modal-actions">
      <button id="addCancel" class="btn"></button>
      <button id="addConfirm" class="btn active"></button>
    </div>
  </div>
</div>

<div id="loginModal" class="overlay">
  <div class="modal">
    <h2 id="loginTitle"></h2>
    <select id="loginPlayer"></select>
    <input id="loginPassword" type="password" autocomplete="off">
    <div class="modal-actions">
      <button id="loginCreate" class="btn"></button>
      <button id="loginSubmit" class="btn active"></button>
    </div>
  </div>
</div>

<div id="adminModal" class="overlay">
  <div class="modal">
    <h2 id="adminTitle"></h2>
    <div class="admin-grid">
      <label id="adminPendingLabel"></label>
      <div id="adminPendingList" class="list"></div>
      <label id="adminPlayerLabel" for="adminPlayer"></label>
      <select id="adminPlayer"></select>
      <div class="admin-row">
        <div>
          <label id="adminGoldLabel" for="adminGold"></label>
          <input id="adminGold" type="number" step="1">
        </div>
        <div>
          <label id="adminXpLabel" for="adminXp"></label>
          <input id="adminXp" type="number" step="1">
        </div>
      </div>
      <div class="admin-row">
        <button id="adminApplyStats" class="btn active"></button>
        <button id="adminGiveBoost" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminFillReady" class="btn"></button>
        <button id="adminClearPlots" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherSunny" class="btn"></button>
        <button id="adminWeatherRain" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherHeat" class="btn"></button>
        <button id="adminWeatherCold" class="btn"></button>
      </div>
      <div style="height:6px"></div>
      <label id="adminCloudTitle"></label>
      <input id="adminCloudUrl">
      <div class="admin-row">
        <input id="adminCloudGameId">
        <input id="adminCloudToken">
      </div>
      <button id="adminCloudSave" class="btn active"></button>
      <div class="admin-row">
        <button id="adminCloudSaveAction" class="btn cloud"></button>
        <button id="adminCloudLoadAction" class="btn cloud"></button>
      </div>
      <button id="adminCloudTestAction" class="btn cloud"></button>
    </div>
    <div class="modal-actions">
      <button id="adminClose" class="btn"></button>
    </div>
  </div>
</div>

<div id="adminAuthModal" class="overlay">
  <div class="modal">
    <h2 id="adminAuthTitle"></h2>
    <div id="adminAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="adminToken" type="password" autocomplete="off">
    <input id="adminTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="adminAuthCancel" class="btn"></button>
      <button id="adminAuthSetup" class="btn active hidden"></button>
      <button id="adminAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

<div id="userAuthModal" class="overlay">
  <div class="modal">
    <h2 id="userAuthTitle"></h2>
    <div id="userAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="userToken" type="password" autocomplete="off">
    <input id="userTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="userAuthCancel" class="btn"></button>
      <button id="userAuthSetup" class="btn active hidden"></button>
      <button id="userAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

function loadAdminAuthLocal() {
  try {
    const raw = localStorage.getItem(ADMIN_AUTH_KEY);

    if (!auth || typeof auth !== "object") return;

function load() {

    if (d && typeof d === "object") {
      S = {
        ...S,
        ...d,
        players: d.players || {},
        weather: d.weather || S.weather,
        cloud: {
          ...S.cloud,
          ...(d.cloud || {})

        admin: {

          ...(d.admin || {}),
          pendingSignups: Array.isArray(d.admin && d.admin.pendingSignups) ? d.admin.pendingSignups : []

}

async function sha256Hex(text) {
  const bytes = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

function makePlayer(name, avatar, location = "") {
  const id = "p" + Date.now() + Math.random().toString(36).slice(2, 6);
  return { id, name, avatar, location, gold: 120, xp: 0, plots: Array.from({ length: MAX_PLOTS }, () => ({ crop: null, plantedAt: 0, wateredAt: 0, fertilizedAt: 0 })) };
}

function levelInfo(xp) {
  let i = 0;
  for (let n = 0; n < XP.length; n++) if (xp >= XP[n]) i = n;
  return { level: i + 1, unlocked: PLOTS[i] || MAX_PLOTS };
}

function weatherTick(now) {
  if (now < S.weather.until) return;
  const w = WEATHER[Math.floor(Math.random() * WEATHER.length)];
  S.weather = { ...w, until: now + (80 + Math.floor(Math.random() * 120)) * 1000 };
}

function growTime(plot) {
  const c = CROPS[plot.crop];
  if (!c) return 0;
  let t = c.grow / (S.weather.mult || 1);
  if (plot.wateredAt > plot.plantedAt) t *= 0.8;
  if (plot.fertilizedAt > plot.plantedAt) t *= 0.62;
  return t;
}

function pState(plot, now) {
  if (!plot.crop) return "empty";
  const e = (now - plot.plantedAt) / 1000;
  const g = growTime(plot);
  if (e >= g + 240) return "withered";
  if (e >= g) return "ready";
  return "growing";
}

function pProgress(plot, now) {
  if (!plot.crop) return 0;
  return Math.min(((now - plot.plantedAt) / 1000) / growTime(plot), 1);
}

function fmtSec(s) {
  const n = Math.max(0, Math.ceil(s));
  if (n < 60) return n + "s";
  const m = Math.floor(n / 60);
  const r = n % 60;
  return r ? m + "m" + r + "s" : m + "m";
}

function pLabel(plot, now) {
  const st = pState(plot, now);
  if (st === "ready") return tr("ready");
  if (st === "withered") return tr("withered");
  if (st === "empty") return "";

async function cloudRequest(action) {
  if (location.protocol === "file:") {
    throw new Error("CLOUD_FILE_MODE");
  }
  const url = (S.cloud.url || "").trim();
  if (!url) {
    notice(tr("cloudNeedUrl"), "err");
    return null;
  }
  if (!/^https:\/\//i.test(url)) {
    throw new Error("CLOUD_BAD_URL");
  }

  const payload = {
    action,
    gameId: S.cloud.gameId || "qqfarm_default",
    token: action === "save" ? (S.cloud.token || "") : "",
    state: action === "save" ? S : undefined,
    ts: Date.now()
  };

  const res = await fetch(url, {
    method: "POST",
    // Use a simple request content type to avoid CORS preflight with Apps Script.
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: JSON.stringify(payload)
  });

  const raw = await res.text();
  let data = null;
  try {
    data = raw ? JSON.parse(raw) : null;
  } catch (_) {
    data = null;
  }

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) throw new Error("CLOUD_UNAUTHORIZED");
    throw new Error("CLOUD_HTTP_" + res.status);
  }
  if (!data || typeof data !== "object") {
    throw new Error("CLOUD_BAD_RESPONSE");
  }
  if (data.ok === false && data.error === "unauthorized") {
    throw new Error("CLOUD_UNAUTHORIZED");
  }
  return data;
}

function cloudErrorNotice(err) {
  const msg = String((err && err.message) || "");
  if (msg === "CLOUD_BAD_URL") {
    notice(tr("cloudBadUrl"), "err");
    return;
  }
  if (msg === "CLOUD_FILE_MODE") {
    notice(tr("cloudFileMode"), "err");
    return;
  }
  if (msg === "CLOUD_UNAUTHORIZED" || msg.includes("HTTP_401") || msg.includes("HTTP_403")) {
    notice(tr("cloudUnauthorized"), "err");
    return;
  }
  if (msg === "CLOUD_BAD_RESPONSE") {
    notice(tr("cloudBadResp"), "err");
    return;
  }
  notice(tr("cloudFail"), "err");
}

async function saveToCloud() {
  try {
    const data = await cloudRequest("save");
    if (data && data.ok) {
      notice(tr("cloudSaveOk"));
      addLog("☁️ " + tr("cloudSaveOk"));
      return;
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

async function saveAuthSnapshotToCloud() {
  if (!(S.cloud.url || "").trim()) return;

  }
}

async function loadFromCloud() {
  try {
    const data = await cloudRequest("load");
    if (data && data.ok === false && data.error === "not_found") {
      notice(tr("cloudNoData"), "info");
      return;
    }
    if (data && data.ok && data.state && typeof data.state === "object") {
      const cloud = { ...S.cloud };
      S = {
        ...S,
        ...data.state,
        players: data.state.players || {},
        weather: data.state.weather || S.weather,
        cloud
      };
      loadAdminAuthLocal();
      save();
      render();
      notice(tr("cloudLoadOk"));
      addLog("☁️ " + tr("cloudLoadOk"));
      return;
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

async function testCloudConnection() {
  try {
    let data = await cloudRequest("ping");
    if (!data) return;
    if (data.ok) {
      notice(tr("cloudPingOk"), "info");
      return;
    }
    // Backward compatibility: older Apps Script deployments may not support ping yet.
    if (data.ok === false && data.error === "bad_action") {
      data = await cloudRequest("load");
      if (!data) return;
      if (data.ok || (data.ok === false && data.error === "not_found")) {
        notice(tr("cloudPingOk"), "info");
        return;
      }
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

function actPlot(idx) {
  if (userUnlockedId !== S.currentId) {
    ensureUserLogin();
    notice(tr("userNeedLogin"), "err");
    return;
  }
  const me = S.players[S.currentId];
  if (!me) return;
  const ownerId = S.viewId || S.currentId;
  const owner = S.players[ownerId];
  if (!owner) return;
  const now = Date.now();
  const mine = ownerId === S.currentId;
  const unlocked = levelInfo(owner.xp).unlocked;
  if (idx >= unlocked) return;

  const p = owner.plots[idx];
  const st = pState(p, now);

  if (!mine) {
    if (st !== "ready") return;
    const day = new Date().toDateString();
    const k = S.currentId + ":" + ownerId + ":" + day;
    S.steals[k] = S.steals[k] || 0;
    if (S.steals[k] >= 5) return;
    const c = CROPS[p.crop];
    const gain = Math.floor(c.sell * 0.62);
    me.gold += gain;
    me.xp += Math.floor(c.xp * 0.4);
    S.steals[k] += 1;
    clearPlot(p);
    addLog("🦊 " + me.name + " " + tr("stolen") + " " + c.icon + " +" + gain + "🪙");
    notice(tr("stolen"));
    save();
    render();
    return;
  }

  if (S.tool === "plant") {
    if (st !== "empty") return;
    const c = CROPS[S.seed];
    if (me.gold < c.cost) return notice(tr("noGold"), "err");
    me.gold -= c.cost;
    p.crop = S.seed;
    p.plantedAt = now;
    p.wateredAt = 0;
    p.fertilizedAt = 0;
    addLog("🌱 " + tr("planted") + " " + c.icon + " " + cropName(S.seed));
    notice(tr("planted"));
  }

  if (S.tool === "water") {
    if (st !== "growing") return;
    if (p.wateredAt > p.plantedAt) return;
    p.wateredAt = now;
    addLog("💧 " + tr("watered"));
    notice(tr("watered"));
  }

  if (S.tool === "fertilize") {
    if (st !== "growing") return;
    if (p.fertilizedAt > p.plantedAt) return;
    if (me.gold < 20) return notice(tr("noGold"), "err");
    me.gold -= 20;
    p.fertilizedAt = now;
    addLog("🧪 " + tr("fertilized"));
    notice(tr("fertilized"));
  }

  if (S.tool === "harvest") {
    if (st !== "ready" && st !== "withered") return;
    const c = CROPS[p.crop];
    const gain = st === "withered" ? Math.floor(c.sell * 0.3) : c.sell;
    me.gold += gain;
    if (st === "ready") me.xp += c.xp;
    clearPlot(p);
    addLog("🌾 " + tr("harvested") + " +" + gain + "🪙");
    notice(tr("harvested"));
  }

  save();
  render();
}

  topUsers.innerHTML = "";
  const allPlayers = Object.values(S.players)
    .sort((a, b) => (b.xp - a.xp) || (b.gold - a.gold) || a.name.localeCompare(b.name));
  allPlayers.forEach((player, idx) => {
    const row = document.createElement("div");
    const isViewed = (S.viewId || S.currentId) === player.id;
    row.className = "leader-row" + (isViewed ? " on" : "");
    row.innerHTML =
      '<div class="leader-rank">' + (idx === 0 ? '🏆' : '#' + (idx + 1)) + '</div>' +
      '<div class="leader-main"><div class="leader-name">' + player.avatar + ' ' + player.name + '</div><div class="leader-sub">Lv.' + levelInfo(player.xp).level + ' · ' + player.gold + '🪙</div></div>' +
      '<div>' + (player.id === S.currentId ? '•' : '👁') + '</div>';
    row.addEventListener("click", () => {
      S.viewId = player.id === S.currentId ? null : player.id;
      save();
      render();
    });
    topUsers.appendChild(row);
  });

  const sec = Math.max(0, Math.ceil((S.weather.until - Date.now()) / 1000));
  document.getElementById("weather").textContent = tr("weather") + ": " + S.weather.icon + " " + tr(S.weather.key) + " · " + sec + "s";
}

function renderToolbar() {
  const bar = document.getElementById("toolbar");
  bar.innerHTML = "";
  if (!S.currentId) return;
  const visiting = !!S.viewId && S.viewId !== S.currentId;
  if (visiting) {
    const day = new Date().toDateString();
    const key = S.currentId + ":" + S.viewId + ":" + day;
    const used = S.steals[key] || 0;
    const tip = document.createElement("div");
    tip.style.fontSize = "12px";
    tip.textContent = "🦊 steal mode " + used + "/5";
    bar.appendChild(tip);
    return;
  }

  TOOLS.forEach((tool, i) => {
    const b = document.createElement("button");
    b.className = "btn" + (S.tool === tool ? " active" : "");
    b.textContent = I18N[S.lang].tools[i];
    b.addEventListener("click", () => { S.tool = tool; save(); render(); });
    bar.appendChild(b);
  });
}

function renderShop() {
  const shop = document.getElementById("shop");
  shop.innerHTML = "";
  if (!S.currentId) return;
  Object.keys(CROPS).forEach((key) => {
    const c = CROPS[key];
    const el = document.createElement("div");
    el.className = "seed" + (S.seed === key ? " on" : "");
    el.innerHTML =
      '<div class="s1">' + c.icon + '</div>' +
      '<div class="s2">' + cropName(key) + '</div>' +
      '<div class="s3">' + c.cost + ' / ' + c.sell + '🪙</div>' +
      '<div class="s3">⏱' + fmtSec(c.grow) + '</div>';
    el.addEventListener("click", () => { S.seed = key; S.tool = "plant"; save(); render(); });
    shop.appendChild(el);
  });
}

function friendReady(p) {
  const lim = levelInfo(p.xp).unlocked;
  let r = 0;
  const now = Date.now();
  for (let i = 0; i < lim; i++) if (pState(p.plots[i], now) === "ready") r += 1;
  return r;
}

function renderFriends() {
  const box = document.getElementById("friends");
  box.innerHTML = "";
  if (!S.currentId) return;
  Object.values(S.players)
    .filter((p) => p.id !== S.currentId)
    .forEach((p) => {
      const row = document.createElement("div");
      row.className = "friend" + (S.viewId === p.id ? " on" : "");
      row.innerHTML =
        '<div style="font-size:21px">' + p.avatar + '</div>' +
        '<div class="friend-main"><div class="friend-name">' + p.name + '</div><div class="friend-sub">Lv.' + levelInfo(p.xp).level + ' · ' + p.gold + '🪙</div></div>' +
        '<div style="font-size:11px">🌟' + friendReady(p) + '</div>';
      row.addEventListener("click", () => { S.viewId = S.viewId === p.id ? null : p.id; save(); render(); });
      box.appendChild(row);
    });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!S.currentId) return;
  const owner = S.players[S.viewId || S.currentId];
  if (!owner) return;
  const now = Date.now();
  const unlocked = levelInfo(owner.xp).unlocked;
  const cols = window.innerWidth <= 780 ? 4 : 5;

  for (let i = 0; i < MAX_PLOTS; i++) {
    const p = owner.plots[i];
    const locked = i >= unlocked;
    const st = locked ? "locked" : pState(p, now);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "plot " + st;

    if (locked) {
      btn.innerHTML = '<div class="plot-icon">🔒</div><div class="plot-time">Lv.</div>';
    } else if (st === "empty") {
      btn.innerHTML = '<div class="plot-icon">🪹</div><div class="plot-time">' + tr("empty") + '</div>';
    } else {
      const icon = st === "withered" ? "🥀" : CROPS[p.crop].icon;
      const badges = (p.wateredAt > p.plantedAt ? "💧" : "") + (p.fertilizedAt > p.plantedAt ? "🧪" : "");
      btn.innerHTML =
        (badges ? '<div class="badges">' + badges + '</div>' : "") +
        '<div class="plot-icon">' + icon + '</div>' +
        '<div class="plot-time">' + pLabel(p, now) + '</div>' +
        '<div class="progress"><span style="width:' + Math.floor(pProgress(p, now) * 100) + '%"></span></div>';
    }

    btn.addEventListener("click", () => {
      S.cursor = i;
      actPlot(i);
      renderSelector();
    });

    grid.appendChild(btn);
  }

  if (S.cursor > cols * Math.ceil(MAX_PLOTS / cols) - 1) S.cursor = 0;
  renderSelector();
}

function renderSelector() {
  const sel = document.getElementById("selector");
  const cols = window.innerWidth <= 780 ? 4 : 5;
  const row = Math.floor(S.cursor / cols);
  const col = S.cursor % cols;
  const x = col * (sel.offsetWidth + 8);
  const y = row * (sel.offsetHeight + 8);
  sel.style.transform = "translate(" + x + "px," + y + "px)";
}

function renderSwitchList() {
  const box = document.getElementById("switchList");
  box.innerHTML = "";
  Object.values(S.players).forEach((p) => {
    const b = document.createElement("button");
    b.className = "btn" + (S.currentId === p.id ? " active" : "");
    b.style.width = "100%";
    b.textContent = p.avatar + " " + p.name + " · Lv." + levelInfo(p.xp).level;
    b.addEventListener("click", () => {
      S.currentId = p.id;
      S.viewId = null;
      userUnlockedId = null;
      closeSwitch();
      save();
      render();
      ensureUserLogin();
    });
    box.appendChild(b);
  });
}

function render() {
  renderText();
  renderHeader();
  renderToolbar();
  renderShop();
  renderFriends();
  renderGrid();
}

function moveCursor(dx, dy) {
  const cols = window.innerWidth <= 780 ? 4 : 5;
  const rows = Math.ceil(MAX_PLOTS / cols);
  let r = Math.floor(S.cursor / cols);
  let c = S.cursor % cols;
  r = (r + dy + rows) % rows;
  c = (c + dx + cols) % cols;
  S.cursor = Math.min(r * cols + c, MAX_PLOTS - 1);
  renderSelector();
}

function setToolByIndex(i) {
  if (i < 0 || i >= TOOLS.length) return;
  S.tool = TOOLS[i];
  save();
  render();
}

function handleCmd(cmdRaw) {
  const cmd = String(cmdRaw || "").trim().toUpperCase();
  if (!cmd) return;
  if (cmd.includes("UP")) moveCursor(0, -1);
  else if (cmd.includes("DOWN")) moveCursor(0, 1);
  else if (cmd.includes("LEFT")) moveCursor(-1, 0);
  else if (cmd.includes("RIGHT")) moveCursor(1, 0);
  else if (cmd.includes("ACT") || cmd === "A") actPlot(S.cursor);
  else if (cmd.includes("TOOL1")) setToolByIndex(0);
  else if (cmd.includes("TOOL2")) setToolByIndex(1);
  else if (cmd.includes("TOOL3")) setToolByIndex(2);
  else if (cmd.includes("TOOL4")) setToolByIndex(3);
}

function decodeBt(v) {
  try { return new TextDecoder().decode(v.buffer).trim(); }
  catch (_) { return ""; }
}

async function connectBluetooth() {
  if (!navigator.bluetooth) return notice(tr("btUnsup"), "err");
  try {
    notice(tr("btConn"), "info");
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb", "battery_service", "device_information"]
    });

    btDevice.addEventListener("gattserverdisconnected", () => {
      btChar = null;
      notice(tr("btDisc"), "err");
      render();
    });

    const server = await btDevice.gatt.connect();
    let service = null;
    try {
      service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
    } catch (_) {
      const services = await server.getPrimaryServices();
      service = services[0] || null;
    }

    if (service) {
      const chars = await service.getCharacteristics();
      btChar = chars[0] || null;
      if (btChar && btChar.properties.notify) {
        await btChar.startNotifications();
        btChar.addEventListener("characteristicvaluechanged", (e) => {
          handleCmd(decodeBt(e.target.value));
        });
      }
    }

    notice(tr("btOk"));
    render();
  } catch (e) {
    console.error(e);
    notice(tr("btFail"), "err");
  }
}

function openSwitch() {
  renderSwitchList();
  document.getElementById("switchModal").classList.add("show");
}
function closeSwitch() { document.getElementById("switchModal").classList.remove("show"); }
function openAdd() {
  const sel = document.getElementById("newAvatar");
  sel.innerHTML = "";
  AVATARS.forEach((av) => {
    const op = document.createElement("option");
    op.value = av;
    op.textContent = av;
    sel.appendChild(op);
  });
  document.getElementById("newName").value = "";
  document.getElementById("newLocation").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("addModal").classList.add("show");
}
function closeAdd() { document.getElementById("addModal").classList.remove("show"); }
function openAdmin() {
  adminRefreshPlayerOptions();
  adminSyncFields();
  adminSyncCloudFields();
  renderAdminPending();
  document.getElementById("adminModal").classList.add("show");
}
function closeAdmin() { document.getElementById("adminModal").classList.remove("show"); }

function bindUI() {
  document.getElementById("playerBtn").addEventListener("click", openSwitch);
  document.getElementById("switchClose").addEventListener("click", closeSwitch);
  document.getElementById("switchModal").addEventListener("click", (e) => { if (e.target.id === "switchModal") closeSwitch(); });

  document.getElementById("addBtn").addEventListener("click", openAdd);
  document.getElementById("addCancel").addEventListener("click", closeAdd);
  document.getElementById("addModal").addEventListener("click", (e) => { if (e.target.id === "addModal") closeAdd(); });
  document.getElementById("addConfirm").addEventListener("click", async () => {
    const name = document.getElementById("newName").value.trim();
    const location = document.getElementById("newLocation").value.trim();
    const password = document.getElementById("newPassword").value;
    const av = document.getElementById("newAvatar").value || AVATARS[0];
    if (!name) return;
    if (!location) return;
    if (!password || password.length < 4) return notice(tr("adminTokenTooShort"), "err");
    const exists = Object.values(S.players).some((p) => normalizeName(p.name) === normalizeName(name));
    if (exists) return notice(tr("signupNameExists"), "err");
    const p = makePlayer(name, av, location);
    S.players[p.id] = p;
    S.userAuth.userHashes[p.id] = await sha256Hex(password);
    S.currentId = p.id;
    userUnlockedId = p.id;
    addLog("🆕 " + p.name + " joined");
    closeAdd();
    closeLoginPage();
    save();
    saveAuthSnapshotToCloud();
    render();
    notice(tr("userAuthSetOk"), "info");
  });

  document.getElementById("tabMine").addEventListener("click", () => { S.viewId = null; save(); render(); });
  document.getElementById("tabVisit").addEventListener("click", () => {
    const ids = Object.keys(S.players).filter((id) => id !== S.currentId);
    S.viewId = ids[0] || null;
    save();
    render();
  });

  document.getElementById("btBtn").addEventListener("click", connectBluetooth);
  document.getElementById("adminBtn").addEventListener("click", requestAdminOpen);
  document.getElementById("logoutBtn").addEventListener("click", logoutCurrentUser);

  document.getElementById("loginCreate").addEventListener("click", openAdd);
  document.getElementById("loginSubmit").addEventListener("click", submitLoginPage);
  document.getElementById("loginModal").addEventListener("click", (e) => { if (e.target.id === "loginModal") {} });

  document.getElementById("adminClose").addEventListener("click", closeAdmin);
  document.getElementById("adminModal").addEventListener("click", (e) => { if (e.target.id === "adminModal") closeAdmin(); });
  document.getElementById("adminPlayer").addEventListener("change", adminSyncFields);
  document.getElementById("adminApplyStats").addEventListener("click", adminApplyStats);
  document.getElementById("adminGiveBoost").addEventListener("click", adminBoost);
  document.getElementById("adminFillReady").addEventListener("click", adminFillReady);
  document.getElementById("adminClearPlots").addEventListener("click", adminClearPlots);
  document.getElementById("adminWeatherSunny").addEventListener("click", () => adminSetWeather(0));
  document.getElementById("adminWeatherRain").addEventListener("click", () => adminSetWeather(1));
  document.getElementById("adminWeatherHeat").addEventListener("click", () => adminSetWeather(2));
  document.getElementById("adminWeatherCold").addEventListener("click", () => adminSetWeather(3));
  document.getElementById("adminCloudSave").addEventListener("click", adminSaveCloudCfg);
  document.getElementById("adminCloudSaveAction").addEventListener("click", () => {
    adminReadCloudFields();
    saveToCloud();
  });
  document.getElementById("adminCloudLoadAction").addEventListener("click", () => {
    adminReadCloudFields();
    loadFromCloud();
  });
  document.getElementById("adminCloudTestAction").addEventListener("click", () => {
    adminReadCloudFields();
    testCloudConnection();
  });

  document.getElementById("adminAuthCancel").addEventListener("click", closeAdminAuth);
  document.getElementById("adminAuthModal").addEventListener("click", (e) => { if (e.target.id === "adminAuthModal") closeAdminAuth(); });
  document.getElementById("adminAuthSetup").addEventListener("click", setupAdminToken);
  document.getElementById("adminAuthUnlock").addEventListener("click", unlockAdmin);

  document.getElementById("userAuthCancel").addEventListener("click", closeUserAuth);
  document.getElementById("userAuthModal").addEventListener("click", (e) => { if (e.target.id === "userAuthModal") closeUserAuth(); });
  document.getElementById("userAuthSetup").addEventListener("click", setupUserToken);
  document.getElementById("userAuthUnlock").addEventListener("click", unlockUser);

  window.addEventListener("resize", renderSelector);

  document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "arrowup" || k === "w") moveCursor(0, -1);
    if (k === "arrowdown" || k === "s") moveCursor(0, 1);
    if (k === "arrowleft" || k === "a") moveCursor(-1, 0);
    if (k === "arrowright" || k === "d") moveCursor(1, 0);
    if (k === " ") { e.preventDefault(); actPlot(S.cursor); }
    if (k === "1") setToolByIndex(0);
    if (k === "2") setToolByIndex(1);
    if (k === "3") setToolByIndex(2);
    if (k === "4") setToolByIndex(3);
  });

  document.getElementById("pad").addEventListener("click", (e) => {
    const b = e.target.closest(".pad-btn");
    if (!b) return;
    const act = b.getAttribute("data-act");
    if (act === "left") moveCursor(-1, 0);
    if (act === "right") moveCursor(1, 0);
    if (act === "up") moveCursor(0, -1);
    if (act === "down") moveCursor(0, 1);
    if (act === "action") actPlot(S.cursor);
  });
}

function loop() {
  weatherTick(Date.now());
  renderHeader();
  renderGrid();
  renderFriends();
  save();
}

async function boot() {
  load();
  S.lang = "en";
  S.admin.tokenHash = ADMIN_FIXED_HASH;
  if (!S.admin.adminId || !S.players[S.admin.adminId]) {
    S.admin.adminId = S.currentId;
  }
  saveAdminAuthLocal();
  bindUI();
  if ((S.cloud.url || "").trim()) {
    await loadFromCloud();
  }
  render();
  openLoginPage();
  setInterval(loop, 1000);
}

boot();
</script>
