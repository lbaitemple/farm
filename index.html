<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QQ Farm</title>
<style>
:root {
  --bg1: #1f5b30;
  --bg2: #66a655;
  --panel: rgba(13, 33, 16, 0.56);
  --line: rgba(255, 255, 255, 0.22);
  --txt: #fff8e9;
  --gold: #f5cb3e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--txt);
  background:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,.12), transparent 36%),
    radial-gradient(circle at 82% 82%, rgba(255,220,150,.2), transparent 46%),
    linear-gradient(150deg, var(--bg1), var(--bg2));
  touch-action: manipulation;
}
.shell { max-width: 1200px; margin: 0 auto; padding: 12px; }
.header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 10px;
  background: linear-gradient(180deg, rgba(88,57,21,.82), rgba(67,44,19,.8));
}
.brand { font-size: clamp(18px, 2.7vw, 24px); font-weight: 800; color: var(--gold); }
.player-chip, .gold-chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(0,0,0,.26);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.player-chip { cursor: pointer; }
.actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  border: none;
  border-radius: 10px;
  padding: 8px 10px;
  font-weight: 700;
  cursor: pointer;
  color: var(--txt);
  background: rgba(255,255,255,.16);
}
.btn.active { outline: 2px solid rgba(245,203,62,.75); background: rgba(245,203,62,.24); }
.btn.bluetooth { background: linear-gradient(140deg, #4a9dea, #2a6fbc); }
.btn.bluetooth.connected { background: linear-gradient(140deg, #4ecf76, #2e9450); }
.btn.cloud { background: linear-gradient(140deg, #8a6be0, #5b45b7); }
.btn.admin { background: linear-gradient(140deg, #d9903d, #b7642b); }
.langs { display: flex; gap: 6px; }
.lang-btn { border: none; border-radius: 8px; padding: 6px 8px; background: rgba(255,255,255,.16); color: var(--txt); cursor: pointer; }
.lang-btn.on { background: rgba(245,203,62,.27); outline: 1px solid rgba(245,203,62,.9); }
.main { margin-top: 12px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 12px; }
.panel {
  border: 2px solid var(--line);
  border-radius: 16px;
  background: var(--panel);
}
.farm { padding: 12px; }
.farm-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 9px; }
.farm-title { font-size: 16px; font-weight: 800; }
.farm-body { display: grid; grid-template-columns: 168px minmax(0, 1fr); gap: 10px; align-items: start; }
.farm-meta { display: grid; gap: 4px; }
.leader-panel {
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 12px;
  background: rgba(0,0,0,.16);
  padding: 8px;
}
.leaderboard {
  display: grid;
  gap: 4px;
  max-height: 420px;
  overflow: auto;
}
.leaderboard-label {
  font-size: 11px;
  font-weight: 700;
  opacity: .86;
}
.leader-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  border-radius: 10px;
  padding: 5px 8px;
  background: rgba(0,0,0,.24);
  border: 1px solid rgba(255,255,255,.18);
  cursor: pointer;
}
.leader-row.on {
  background: rgba(245,203,62,.2);
  border-color: rgba(245,203,62,.9);
}
.leader-rank {
  font-weight: 800;
  color: var(--gold);
}
.leader-main {
  min-width: 0;
}
.leader-name {
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.leader-sub {
  font-size: 10px;
  opacity: .82;
}
.weather { font-size: 12px; background: rgba(0,0,0,.24); border-radius: 999px; padding: 5px 10px; }
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.grid-wrap { position: relative; }
.grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; }
.plot {
  aspect-ratio: 1;
  min-height: 70px;
  border-radius: 11px;
  border: 2px solid transparent;
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.plot.empty { background: linear-gradient(130deg, #845923, #a67532); border-color: #6a4619; }
.plot.growing { background: linear-gradient(130deg, #674a31, #845f38); border-color: #4f3821; }
.plot.ready { background: linear-gradient(130deg, #2f8a3f, #47b25a); border-color: #21622c; box-shadow: 0 0 12px rgba(121,238,141,.55); }
.plot.withered { background: linear-gradient(130deg, #643f35, #744942); border-color: #462b25; }
.plot.locked { background: rgba(0,0,0,.2); border-color: rgba(255,255,255,.3); border-style: dashed; cursor: not-allowed; }
.plot-icon { font-size: 28px; }
.plot-time { font-size: 10px; }
.badges { position: absolute; top: 3px; left: 4px; font-size: 11px; }
.progress { position: absolute; bottom: 3px; left: 4px; right: 4px; height: 4px; border-radius: 3px; background: rgba(0,0,0,.34); overflow: hidden; }
.progress > span { display: block; height: 100%; background: linear-gradient(90deg, #8ddd90, #c7f0b5); }
.selector {
  position: absolute;
  width: calc((100% - 32px) / 5);
  height: calc((100% - 32px) / 4);
  border: 2px solid #fbe066;
  border-radius: 11px;
  pointer-events: none;
  box-shadow: 0 0 9px rgba(251,224,102,.68);
  transition: transform 120ms ease;
  z-index: 3;
}
.side { display: grid; gap: 10px; padding: 10px; }
.card { border: 1px solid var(--line); border-radius: 12px; background: rgba(0,0,0,.2); padding: 10px; }
.card h3 { font-size: 13px; margin-bottom: 8px; }
.shop { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.seed { border: 1px solid transparent; border-radius: 10px; background: rgba(255,255,255,.14); padding: 6px; text-align: center; cursor: pointer; }
.seed.on { border-color: rgba(245,203,62,.9); background: rgba(245,203,62,.2); }
.seed .s1 { font-size: 23px; }
.seed .s2 { font-size: 11px; font-weight: 700; }
.seed .s3 { font-size: 10px; opacity: .88; }
.list { display: grid; gap: 6px; max-height: 185px; overflow: auto; }
.friend { border-radius: 10px; border: 1px solid transparent; background: rgba(255,255,255,.12); padding: 6px; display: flex; align-items: center; gap: 7px; cursor: pointer; }
.friend.on { border-color: rgba(245,203,62,.9); background: rgba(245,203,62,.2); }
.friend-main { flex: 1; }
.friend-name { font-size: 12px; font-weight: 700; }
.friend-sub { font-size: 10px; opacity: .8; }
.log { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,.14); padding-bottom: 3px; }
.notice {
  position: fixed;
  top: 84px;
  right: 12px;
  z-index: 130;
  max-width: 300px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,.5);
  background: linear-gradient(140deg, #3f9649, #55ac60);
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 700;
  transform: translateX(130%);
  transition: transform .22s ease;
}
.notice.show { transform: translateX(0); }
.notice.err { background: linear-gradient(140deg, #ad2f32, #ca4d4f); }
.notice.info { background: linear-gradient(140deg, #216ab6, #2f87d5); }
.overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 110; background: rgba(0,0,0,.58); }
.overlay#addModal { z-index: 120; }
.overlay.show { display: flex; }
.modal { width: min(92vw, 360px); border-radius: 14px; border: 2px solid rgba(255,255,255,.35); background: linear-gradient(150deg, #244d2f, #376c41); padding: 14px; }
.modal h2 { margin-bottom: 8px; font-size: 18px; }
.modal input, .modal select {
  width: 100%;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.16);
  color: var(--txt);
  padding: 9px 10px;
  margin: 6px 0;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.admin-grid { display: grid; gap: 6px; }
.admin-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.pending-item {
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  background: rgba(0,0,0,.18);
  padding: 8px;
}
.pending-head { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.pending-actions { display: flex; gap: 6px; }
.hidden { display: none !important; }
.pad {
  display: none;
  position: fixed;
  left: 0;
  right: 0;
  bottom: env(safe-area-inset-bottom, 0);
  z-index: 70;
  padding: 8px;
  background: linear-gradient(180deg, rgba(8,18,9,.15), rgba(8,18,9,.7));
  backdrop-filter: blur(6px);
}
.pad-inner { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.pad-btn { border: none; border-radius: 9px; min-height: 42px; background: rgba(255,255,255,.18); color: var(--txt); font-weight: 700; }
.battle-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
  border: 2px solid rgba(245,203,62,.7);
  border-radius: 12px;
  background: linear-gradient(140deg, rgba(173,47,50,.5), rgba(217,144,61,.42));
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 700;
}
.plot-badge-battle { position: absolute; top: 3px; right: 4px; font-size: 12px; }
.battle-modal { width: min(94vw, 380px); text-align: center; }
.battle-subtitle { font-size: 12px; opacity: .85; margin-bottom: 4px; }
.battle-instructions { font-size: 11px; opacity: .8; margin-bottom: 8px; }
.battle-stats { display: flex; justify-content: center; gap: 18px; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.battle-grid {
  display: grid;
  gap: 4px;
  aspect-ratio: 1;
  margin: 0 auto 10px;
  max-width: 280px;
  transition: transform 60ms ease;
}
.battle-grid.shake { animation: battleShake 220ms ease; }
@keyframes battleShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
.battle-cell { aspect-ratio: 1; border-radius: 5px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); }
.battle-cell.on-path { background: rgba(255,255,255,.16); }
.battle-cell.done { background: linear-gradient(140deg, #4ecf76, #2e9450); }
.battle-cell.target { background: rgba(245,203,62,.75); box-shadow: 0 0 8px rgba(245,203,62,.85); }
.battle-cell.marker { outline: 2px solid #fff; outline-offset: -2px; }
@media (max-width: 980px) { .main { grid-template-columns: 1fr; } }
@media (max-width: 980px) { .main { grid-template-columns: 1fr; } }
@media (max-width: 780px) {
  .farm-body { grid-template-columns: 1fr; }
  .grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .selector { width: calc((100% - 26px) / 4); height: calc((100% - 26px) / 5); }
  .pad { display: block; }
  .shell { padding-bottom: calc(95px + env(safe-area-inset-bottom, 0)); }
  .actions { width: 100%; margin-left: 0; }
}
</style>
</head>
<body>
<div id="notice" class="notice"></div>
<div class="shell">
  <div class="header">
    <div id="titleTxt" class="brand">🌱 QQ农场</div>
    <button id="playerBtn" class="player-chip" title="switch player">
      <span id="hdrAvatar">🌾</span>
      <span id="hdrName">Guest</span>
      <span id="hdrLevel">Lv.1</span>
    </button>
    <div class="gold-chip">🪙 <span id="hdrGold">0</span></div>
    <div class="actions">
      <button id="tabMine" class="btn active"></button>
      <button id="tabVisit" class="btn"></button>
      <button id="btBtn" class="btn bluetooth"></button>
      <button id="adminBtn" class="btn admin"></button>
      <button id="logoutBtn" class="btn"></button>
      <div id="langs" class="langs"></div>
    </div>
  </div>

  <div class="main">
    <div class="panel farm">
      <div class="farm-head">
        <div class="farm-meta">
          <div id="farmTitle" class="farm-title"></div>
        </div>
        <div id="weather" class="weather"></div>
      </div>
      <div id="battleBar" class="battle-bar hidden"></div>
      <div id="toolbar" class="toolbar"></div>
      <div class="farm-body">
        <div class="leader-panel">
          <div id="topUsersLabel" class="leaderboard-label"></div>
          <div id="topUsers" class="leaderboard"></div>
        </div>
        <div class="grid-wrap">
          <div id="selector" class="selector"></div>
          <div id="grid" class="grid"></div>
        </div>
      </div>
    </div>

    <div class="panel side">
      <div class="card">
        <h3 id="shopTitle"></h3>
        <div id="shop" class="shop"></div>
      </div>
      <div class="card">
        <h3 id="friendsTitle"></h3>
        <div id="friends" class="list"></div>
        <button id="addBtn" class="btn" style="width:100%;margin-top:8px"></button>
      </div>
      <div class="card">
        <h3 id="logTitle"></h3>
        <div id="controlHint" style="font-size:11px;opacity:.86;margin-bottom:8px"></div>
        <div id="log" class="list"></div>
      </div>
    </div>
  </div>
</div>

<div id="pad" class="pad">
  <div class="pad-inner">
    <button class="pad-btn" data-act="left">◀</button>
    <button class="pad-btn" data-act="up">▲</button>
    <button class="pad-btn" data-act="action">A</button>
    <button class="pad-btn" data-act="down">▼</button>
    <button class="pad-btn" data-act="right">▶</button>
  </div>
</div>

<div id="switchModal" class="overlay">
  <div class="modal">
    <h2 id="switchTitle"></h2>
    <div id="switchList" class="list"></div>
    <div class="modal-actions"><button id="switchClose" class="btn"></button></div>
  </div>
</div>

<div id="addModal" class="overlay">
  <div class="modal">
    <h2 id="addTitle"></h2>
    <input id="newName" maxlength="10">
    <input id="newLocation" maxlength="24">
    <input id="newPassword" type="password" autocomplete="off">
    <select id="newAvatar"></select>
    <div class="modal-actions">
      <button id="addCancel" class="btn"></button>
      <button id="addConfirm" class="btn active"></button>
    </div>
  </div>
</div>

<div id="loginModal" class="overlay">
  <div class="modal">
    <h2 id="loginTitle"></h2>
    <select id="loginPlayer"></select>
    <input id="loginPassword" type="password" autocomplete="off">
    <div class="modal-actions">
      <button id="loginCreate" class="btn"></button>
      <button id="loginSubmit" class="btn active"></button>
    </div>
  </div>
</div>

<div id="adminModal" class="overlay">
  <div class="modal">
    <h2 id="adminTitle"></h2>
    <div class="admin-grid">
      <label id="adminPendingLabel"></label>
      <div id="adminPendingList" class="list"></div>
      <label id="adminPlayerLabel" for="adminPlayer"></label>
      <select id="adminPlayer"></select>
      <div class="admin-row">
        <div>
          <label id="adminGoldLabel" for="adminGold"></label>
          <input id="adminGold" type="number" step="1">
        </div>
        <div>
          <label id="adminXpLabel" for="adminXp"></label>
          <input id="adminXp" type="number" step="1">
        </div>
      </div>
      <div class="admin-row">
        <button id="adminApplyStats" class="btn active"></button>
        <button id="adminGiveBoost" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminFillReady" class="btn"></button>
        <button id="adminClearPlots" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherSunny" class="btn"></button>
        <button id="adminWeatherRain" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherHeat" class="btn"></button>
        <button id="adminWeatherCold" class="btn"></button>
      </div>
      <div style="height:6px"></div>
      <label id="adminCloudTitle"></label>
      <input id="adminCloudUrl">
      <div class="admin-row">
        <input id="adminCloudGameId">
        <input id="adminCloudToken">
      </div>
      <button id="adminCloudSave" class="btn active"></button>
      <div class="admin-row">
        <button id="adminCloudSaveAction" class="btn cloud"></button>
        <button id="adminCloudLoadAction" class="btn cloud"></button>
      </div>
      <button id="adminCloudTestAction" class="btn cloud"></button>
    </div>
    <div class="modal-actions">
      <button id="adminClose" class="btn"></button>
    </div>
  </div>
</div>

<div id="adminAuthModal" class="overlay">
  <div class="modal">
    <h2 id="adminAuthTitle"></h2>
    <div id="adminAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="adminToken" type="password" autocomplete="off">
    <input id="adminTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="adminAuthCancel" class="btn"></button>
      <button id="adminAuthSetup" class="btn active hidden"></button>
      <button id="adminAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

<div id="userAuthModal" class="overlay">
  <div class="modal">
    <h2 id="userAuthTitle"></h2>
    <div id="userAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="userToken" type="password" autocomplete="off">
    <input id="userTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="userAuthCancel" class="btn"></button>
      <button id="userAuthSetup" class="btn active hidden"></button>
      <button id="userAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

<div id="battleModal" class="overlay">
  <div class="modal battle-modal">
    <h2 id="battleTitle"></h2>
    <div id="battleSubtitle" class="battle-subtitle"></div>
    <div id="battleInstructions" class="battle-instructions"></div>
    <div class="battle-stats">
      <div><span id="battleTimeLabel"></span>: <span id="battleTimer">0.0s</span></div>
      <div><span id="battleMistakesLabel"></span>: <span id="battleMistakes">0</span></div>
    </div>
    <div id="battleGrid" class="battle-grid"></div>
    <div class="modal-actions">
      <button id="battleGiveUp" class="btn"></button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>

async function sha256Hex(text) {

}

// --- Steal battles -----------------------------------------------------
// When a would-be thief targets a plot whose owner is currently active, the
// steal becomes an async "trace race" instead of an instant grab: both
// players independently trace the identical (seed-derived) path on their own
// screen, whenever they each get to it, and whoever finishes with the better
// combined speed+accuracy score wins. There is no live/simultaneous channel
// in this game (state only moves via periodic cloud polling), so the race is
// inherently asynchronous -- see mergeBattles() for how two independent score
// submissions get reconciled without clobbering each other.

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Deterministic self-avoiding random walk on a BATTLE_GRID_SIZE grid, so both
// participants generate the exact same track from the same numeric seed.
function generateBattlePath(seed) {
  const rand = mulberry32(seed);
  const dirNames = Object.keys(DIR_KEYS);
  const start = { x: Math.floor(BATTLE_GRID_SIZE / 2), y: Math.floor(BATTLE_GRID_SIZE / 2) };
  let cell = { ...start };
  const visited = new Set([cell.x + "," + cell.y]);
  const moves = [];
  const cells = [{ ...cell }];
  let guard = 0;
  while (moves.length < BATTLE_PATH_LEN && guard < 400) {
    guard++;
    const order = dirNames.slice().sort(() => rand() - 0.5);
    let advanced = false;
    for (const dir of order) {
      const [dx, dy] = DIR_KEYS[dir];
      const nx = cell.x + dx, ny = cell.y + dy;
      if (nx < 0 || ny < 0 || nx >= BATTLE_GRID_SIZE || ny >= BATTLE_GRID_SIZE) continue;
      const key = nx + "," + ny;
      if (visited.has(key)) continue;
      visited.add(key);
      cell = { x: nx, y: ny };
      moves.push(dir);
      cells.push({ ...cell });
      advanced = true;
      break;
    }
    if (!advanced) break;
  }
  return { start, moves, cells };
}

function battlesForOwner(ownerId) {
  return Object.values(S.battles).filter((b) => b.ownerId === ownerId);
}

function findExistingBattle(ownerId, plotIndex, challengerId) {
  return Object.values(S.battles).find((b) =>
    b.ownerId === ownerId && b.plotIndex === plotIndex && b.challengerId === challengerId && !b.resolved);
}

function activeBattleFor(ownerId) {
  return battlesForOwner(ownerId).find((b) => b.status === "active" && !b.resolved);
}

// Promotes the oldest queued challenge for this owner to active, if nothing
// is active yet -- this is what makes challengers "battle one at a time."
function activateNextQueuedBattle(ownerId) {
  if (activeBattleFor(ownerId)) return;
  const queued = battlesForOwner(ownerId)
    .filter((b) => b.status === "queued" && !b.resolved)
    .sort((a, b) => a.queuedAt - b.queuedAt)[0];
  if (!queued) return;
  const now = Date.now();
  queued.status = "active";
  queued.activatedAt = now;
  queued.expiresAt = now + BATTLE_TIME_LIMIT_MS;
  queued.updatedAt = now;
}

function requestBattle(owner, challenger, plotIndex, plot, now) {
  const existing = findExistingBattle(owner.id, plotIndex, challenger.id);
  if (existing) {
    notice(tr("battleAlreadyQueued"), "info");
    return;
  }
  const id = "b" + now + Math.random().toString(36).slice(2, 7);
  const seed = (now ^ Math.floor(Math.random() * 1e9)) >>> 0;
  const battle = {
    id,
    ownerId: owner.id,
    challengerId: challenger.id,
    plotIndex,
    cropKey: plot.crop,
    plantedAtSnapshot: plot.plantedAt,
    seed,
    status: "queued",
    queuedAt: now,
    activatedAt: 0,
    expiresAt: 0,
    scores: {},
    resolved: false,
    winnerId: null,
    resolvedAt: 0,
    updatedAt: now
  };
  S.battles[id] = battle;
  activateNextQueuedBattle(owner.id);
  save();
  render();
  if (battle.status === "active" || S.battles[id].status === "active") {
    notice(tr("battleStarted"), "info");
  } else {
    notice(tr("battleQueued"), "info");
  }
}

// Runs a plain function of (scores, expiry) so both participants compute the
// identical outcome independently -- redundant computation is harmless since
// there's nothing nondeterministic about who "wins" the race to apply it.
function tryResolveBattle(battle) {
  if (!battle || battle.resolved || battle.status !== "active") return;
  const now = Date.now();
  const ownerScore = battle.scores[battle.ownerId];
  const challengerScore = battle.scores[battle.challengerId];
  const expired = now > battle.expiresAt;
  if (!expired && !(ownerScore && challengerScore)) return;

  const effective = (s) => (s ? s.score : Infinity);
  const ownerEff = effective(ownerScore);
  const challengerEff = effective(challengerScore);
  let winnerId;
  if (ownerEff === Infinity && challengerEff === Infinity) winnerId = battle.ownerId;
  else winnerId = challengerEff < ownerEff ? battle.challengerId : battle.ownerId;

  const owner = S.players[battle.ownerId];
  const challenger = S.players[battle.challengerId];
  const plot = owner && owner.plots[battle.plotIndex];
  const plotStillValid = plot && plot.crop === battle.cropKey && plot.plantedAt === battle.plantedAtSnapshot;

  if (winnerId === battle.challengerId && plotStillValid && challenger) {
    const c = CROPS[plot.crop];
    const gain = Math.floor(c.sell * 0.62);
    challenger.gold += gain;
    challenger.xp += Math.floor(c.xp * 0.4);
    challenger.updatedAt = now;
    const day = new Date(now).toDateString();
    const k = battle.challengerId + ":" + battle.ownerId + ":" + day;
    S.steals[k] = (S.steals[k] || 0) + 1;
    clearPlot(plot);
    owner.updatedAt = now;
  }

  battle.resolved = true;
  battle.winnerId = winnerId;
  battle.resolvedAt = now;
  battle.status = "resolved";
  battle.updatedAt = now;
  activateNextQueuedBattle(battle.ownerId);

  if (S.currentId === battle.ownerId || S.currentId === battle.challengerId) {
    const iWon = winnerId === S.currentId;
    addLog("⚔️ " + (iWon ? tr("battleWon") : tr("battleLost")));
    notice(iWon ? tr("battleWon") : tr("battleLost"), iWon ? "" : "err");
  }
}

function resolveRelevantBattles() {
  if (!S.currentId) return;
  Object.values(S.battles).forEach((b) => {
    if (b.ownerId === S.currentId || b.challengerId === S.currentId) tryResolveBattle(b);
  });
}

function pruneOldBattles() {
  const now = Date.now();
  Object.keys(S.battles).forEach((id) => {
    const b = S.battles[id];
    if (b.resolved && now - b.resolvedAt > BATTLE_MAX_AGE_MS) delete S.battles[id];
  });
}

// The battle relevant to the current player right now, prioritizing whatever
// needs their attention most: an unresolved result, then an active race
// awaiting their attempt, then their position in an owner's queue.
function myRelevantBattle() {
  if (!S.currentId) return null;
  const mine = Object.values(S.battles).filter((b) => b.ownerId === S.currentId || b.challengerId === S.currentId);
  const needsAttempt = mine.find((b) => b.status === "active" && !b.resolved && !b.scores[S.currentId]);
  if (needsAttempt) return needsAttempt;
  const queued = mine.filter((b) => b.status === "queued" && !b.resolved && b.challengerId === S.currentId)
    .sort((a, b) => a.queuedAt - b.queuedAt)[0];
  if (queued) return queued;
  const waiting = mine.find((b) => b.status === "active" && !b.resolved);
  return waiting || null;
}

function renderBattleBar() {

  if (!bar || !S.currentId) { if (bar) { bar.classList.add("hidden"); bar.innerHTML = ""; } return; }
  const battle = myRelevantBattle();
  if (!battle) {
    bar.classList.add("hidden");
    bar.innerHTML = "";
    return;
  }
  bar.classList.remove("hidden");
  const isOwner = battle.ownerId === S.currentId;
  const opponent = S.players[isOwner ? battle.challengerId : battle.ownerId];
  const oppName = (opponent && opponent.name) || "?";
  const crop = CROPS[battle.cropKey] ? cropName(battle.cropKey) : "";

  let text = "";
  let showBtn = false;
  if (battle.status === "queued") {
    const queue = battlesForOwner(battle.ownerId).filter((b) => b.status === "queued" && !b.resolved)
      .sort((a, b) => a.queuedAt - b.queuedAt);
    const pos = queue.findIndex((b) => b.id === battle.id) + 1;
    text = tr("battleQueuePos").replace("{n}", pos).replace("{name}", oppName);
  } else if (battle.status === "active" && !battle.scores[S.currentId]) {
    text = (isOwner ? tr("battleIncoming") : tr("battleChallenge")).replace("{name}", oppName).replace("{crop}", crop);
    showBtn = true;
  } else if (battle.status === "active") {
    text = tr("battleWaitingOpponent").replace("{name}", oppName);
  }

  bar.innerHTML = "";
  const span = document.createElement("span");
  span.textContent = text;
  bar.appendChild(span);
  if (showBtn) {
    const btn = document.createElement("button");
    btn.className = "btn active";
    btn.textContent = tr("battleFight");
    btn.addEventListener("click", () => openBattleModal(battle));
    bar.appendChild(btn);
  }
}

function renderBattleTrack(battle, stepIndex) {
  const path = generateBattlePath(battle.seed);
  const grid = document.getElementById("battleGrid");
  if (!grid) return;
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = "repeat(" + BATTLE_GRID_SIZE + ", 1fr)";
  const pathIndexByKey = new Map(path.cells.map((c, i) => [c.x + "," + c.y, i]));
  for (let y = 0; y < BATTLE_GRID_SIZE; y++) {
    for (let x = 0; x < BATTLE_GRID_SIZE; x++) {
      const cell = document.createElement("div");
      cell.className = "battle-cell";
      const idx = pathIndexByKey.get(x + "," + y);
      if (idx !== undefined) {
        cell.classList.add("on-path");
        if (idx <= stepIndex) cell.classList.add("done");
        if (idx === stepIndex + 1) cell.classList.add("target");
        if (idx === stepIndex) cell.classList.add("marker");
      }
      grid.appendChild(cell);
    }
  }
}

function finishBattleAttempt(battle) {
  const elapsedMs = Date.now() - battleRuntime.startedAt;
  const mistakes = battleRuntime.mistakes;
  const score = elapsedMs + mistakes * BATTLE_MISTAKE_PENALTY_MS;
  const now = Date.now();
  battle.scores[S.currentId] = { elapsedMs, mistakes, score, submittedAt: now };
  battle.updatedAt = now;
  closeBattleModal();
  notice(tr("battleSubmitted"), "info");
  tryResolveBattle(battle);
  save();
  render();
  renderBattleBar();
}

function battleTryMove(dir) {
  if (!battleRuntime) return;
  const battle = S.battles[battleRuntime.battleId];
  if (!battle || battle.resolved) { closeBattleModal(); return; }
  const path = generateBattlePath(battle.seed);
  const expected = path.moves[battleRuntime.stepIndex];
  if (dir === expected) {
    battleRuntime.stepIndex++;
    renderBattleTrack(battle, battleRuntime.stepIndex);
    if (battleRuntime.stepIndex >= path.moves.length) {
      finishBattleAttempt(battle);
    }
  } else {
    battleRuntime.mistakes++;
    const el = document.getElementById("battleMistakes");
    if (el) el.textContent = String(battleRuntime.mistakes);
    flashBattleGrid();
  }
}

async function cloudRequest(action) {
  if (location.protocol === "file:") {
    throw new Error("CLOUD_FILE_MODE");
  }
  const url = (S.cloud.url || "").trim();
  if (!url) {
    notice(tr("cloudNeedUrl"), "err");
    return null;
  }
  if (!/^https:\/\//i.test(url)) {
    throw new Error("CLOUD_BAD_URL");
  }

  const payload = {
    action,
    gameId: S.cloud.gameId || "qqfarm_default",
    token: action === "save" ? (S.cloud.token || "") : "",
    state: action === "save" ? S : undefined,
    ts: Date.now()
  };

  const res = await fetch(url, {
    method: "POST",
    // Use a simple request content type to avoid CORS preflight with Apps Script.
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: JSON.stringify(payload)
  });

  const raw = await res.text();
  let data = null;
  try {
    data = raw ? JSON.parse(raw) : null;
  } catch (_) {
    data = null;
  }

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) throw new Error("CLOUD_UNAUTHORIZED");
    throw new Error("CLOUD_HTTP_" + res.status);
  }
  if (!data || typeof data !== "object") {
    throw new Error("CLOUD_BAD_RESPONSE");
  }
  if (data.ok === false && data.error === "unauthorized") {
    throw new Error("CLOUD_UNAUTHORIZED");
  }
  return data;
}

function mergePlayers(localPlayers, cloudPlayers) {
  const merged = { ...localPlayers };
  Object.keys(cloudPlayers || {}).forEach((id) => {
    const c = cloudPlayers[id];
    const l = merged[id];
    if (!l) { merged[id] = c; return; }
    // lastActiveAt is a presence heartbeat, not a data edit -- keep whichever
    // side saw the player more recently even if the other side "wins" the record.
    const newest = (c.updatedAt || 0) > (l.updatedAt || 0) ? c : l;
    const lastActiveAt = Math.max(l.lastActiveAt || 0, c.lastActiveAt || 0);
    merged[id] = newest.lastActiveAt === lastActiveAt ? newest : { ...newest, lastActiveAt };
  });
  return merged;
}

function mergeSteals(localSteals, cloudSteals) {
  const merged = { ...localSteals };
  Object.keys(cloudSteals || {}).forEach((k) => {
    merged[k] = Math.max(merged[k] || 0, cloudSteals[k] || 0);
  });
  return merged;
}

function mergePendingSignups(localList, cloudList) {
  const map = new Map();
  (localList || []).forEach((r) => map.set(r.id, r));
  (cloudList || []).forEach((r) => { if (!map.has(r.id)) map.set(r.id, r); });
  return Array.from(map.values());
}

// Battle records get written to by two different players (owner + challenger),
// each only ever touching their own scores[myId] entry. A whole-record
// newest-wins merge would let one player's score submission erase the other's,
// so scores are unioned field-by-field instead of replaced wholesale.
function mergeBattles(localBattles, cloudBattles) {
  const merged = { ...localBattles };
  Object.keys(cloudBattles || {}).forEach((id) => {
    const c = cloudBattles[id];
    const l = merged[id];
    if (!l) { merged[id] = c; return; }
    const base = (c.updatedAt || 0) > (l.updatedAt || 0) ? c : l;
    merged[id] = {
      ...base,
      scores: { ...(c.scores || {}), ...(l.scores || {}) },
      resolved: !!(l.resolved || c.resolved),
      winnerId: l.winnerId || c.winnerId || null,
      status: (l.resolved || c.resolved) ? "resolved" : base.status
    };
  });
  return merged;
}

// Cloud state is a shared blob written by every open session, so a plain overwrite
// on save/load would let whichever tab writes last erase everyone else's progress.
// Instead we reconcile field-by-field, letting the newest per-player update win.
function mergeCloudStateIn(cloudState) {
  if (!cloudState || typeof cloudState !== "object") return;
  S.players = mergePlayers(S.players, cloudState.players || {});
  S.steals = mergeSteals(S.steals, cloudState.steals || {});
  S.battles = mergeBattles(S.battles, cloudState.battles || {});
  S.userAuth.userHashes = { ...((cloudState.userAuth && cloudState.userAuth.userHashes) || {}), ...S.userAuth.userHashes };
  S.admin.pendingSignups = mergePendingSignups(S.admin.pendingSignups, (cloudState.admin && cloudState.admin.pendingSignups) || []);
  if (!S.admin.adminId && cloudState.admin && cloudState.admin.adminId) {
    S.admin.adminId = cloudState.admin.adminId;
  }
  if (cloudState.weather && (cloudState.weather.setAt || 0) > (S.weather.setAt || 0)) {
    S.weather = cloudState.weather;
  }
  pruneOldBattles();
}

// Pulls the latest cloud blob and merges it into local state. Used both for the
// periodic background refresh and as a pre-push step before every cloud save, so
// a save reconciles with whatever other sessions wrote instead of clobbering it.
async function pullAndMergeCloud() {
  const data = await cloudRequest("load");
  if (data && data.ok && data.state && typeof data.state === "object") {
    mergeCloudStateIn(data.state);
    resolveRelevantBattles();
    save(false);
    render();
    renderBattleBar();
  }
  return data;
}

async function pullCloudSilently() {

  try {

  } catch (e) {

  }
}

// Poll faster while actively visiting a friend's farm, since that's when
// staleness is most visible; fall back to a slower idle cadence otherwise.
function cloudPollIntervalMs() {
  const visiting = !!S.viewId && S.viewId !== S.currentId;
  return visiting ? 2000 : 5000;
}

function scheduleCloudPoll() {
  setTimeout(async () => {
    await pullCloudSilently();
    scheduleCloudPoll();
  }, cloudPollIntervalMs());
}

function cloudErrorNotice(err) {
  const msg = String((err && err.message) || "");
  if (msg === "CLOUD_BAD_URL") {
    notice(tr("cloudBadUrl"), "err");
    return;
  }
  if (msg === "CLOUD_FILE_MODE") {
    notice(tr("cloudFileMode"), "err");
    return;
  }
  if (msg === "CLOUD_UNAUTHORIZED" || msg.includes("HTTP_401") || msg.includes("HTTP_403")) {
    notice(tr("cloudUnauthorized"), "err");
    return;
  }
  if (msg === "CLOUD_BAD_RESPONSE") {
    notice(tr("cloudBadResp"), "err");
    return;
  }
  notice(tr("cloudFail"), "err");
}

async function saveToCloud() {
  try {
    await pullAndMergeCloud();
    const data = await cloudRequest("save");
    if (data && data.ok) {
      notice(tr("cloudSaveOk"));
      addLog("☁️ " + tr("cloudSaveOk"));
      return;
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

async function saveAuthSnapshotToCloud() {
  if (!(S.cloud.url || "").trim()) return;
  try {
    await pullAndMergeCloud();

  } catch (e) {
    console.error(e);
  }
}

async function loadFromCloud() {
  try {
    const data = await pullAndMergeCloud();
    if (data && data.ok === false && data.error === "not_found") {
      notice(tr("cloudNoData"), "info");
      return;
    }
    if (data && data.ok && data.state && typeof data.state === "object") {
      notice(tr("cloudLoadOk"));
      addLog("☁️ " + tr("cloudLoadOk"));
      return;
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

async function testCloudConnection() {
  try {
    let data = await cloudRequest("ping");
    if (!data) return;
    if (data.ok) {
      notice(tr("cloudPingOk"), "info");
      return;
    }
    // Backward compatibility: older Apps Script deployments may not support ping yet.
    if (data.ok === false && data.error === "bad_action") {
      data = await cloudRequest("load");
      if (!data) return;
      if (data.ok || (data.ok === false && data.error === "not_found")) {
        notice(tr("cloudPingOk"), "info");
        return;
      }
    }
    throw new Error("bad response");
  } catch (e) {
    console.error(e);
    cloudErrorNotice(e);
  }
}

function actPlot(idx) {
  if (userUnlockedId !== S.currentId) {
    ensureUserLogin();
    notice(tr("userNeedLogin"), "err");
    return;
  }
  const me = S.players[S.currentId];
  if (!me) return;
  const ownerId = S.viewId || S.currentId;
  const owner = S.players[ownerId];
  if (!owner) return;
  const now = Date.now();
  const mine = ownerId === S.currentId;
  const unlocked = levelInfo(owner.xp).unlocked;
  if (idx >= unlocked) return;

  const p = owner.plots[idx];
  const st = pState(p, now);

  if (!mine) {
    if (st !== "ready") return;
    const day = new Date().toDateString();
    const k = S.currentId + ":" + ownerId + ":" + day;
    S.steals[k] = S.steals[k] || 0;
    if (S.steals[k] >= 5) return;

    const ownerActive = (now - (owner.lastActiveAt || 0)) < BATTLE_ACTIVE_WINDOW_MS;
    if (!ownerActive) {
      const c = CROPS[p.crop];
      const gain = Math.floor(c.sell * 0.62);
      me.gold += gain;
      me.xp += Math.floor(c.xp * 0.4);
      S.steals[k] += 1;
      clearPlot(p);
      me.updatedAt = now;
      owner.updatedAt = now;
      addLog("🦊 " + me.name + " " + tr("stolen") + " " + c.icon + " +" + gain + "🪙");
      notice(tr("stolen"));
      save();
      render();
      return;
    }

    requestBattle(owner, me, idx, p, now);
    return;
  }

  if (S.tool === "plant") {
    if (st !== "empty") return;
    const c = CROPS[S.seed];
    if (me.gold < c.cost) return notice(tr("noGold"), "err");
    me.gold -= c.cost;
    p.crop = S.seed;
    p.plantedAt = now;
    p.wateredAt = 0;
    p.fertilizedAt = 0;
    addLog("🌱 " + tr("planted") + " " + c.icon + " " + cropName(S.seed));
    notice(tr("planted"));
  }

  if (S.tool === "water") {
    if (st !== "growing") return;
    if (p.wateredAt > p.plantedAt) return;
    p.wateredAt = now;
    addLog("💧 " + tr("watered"));
    notice(tr("watered"));
  }

  if (S.tool === "fertilize") {
    if (st !== "growing") return;
    if (p.fertilizedAt > p.plantedAt) return;
    if (me.gold < 20) return notice(tr("noGold"), "err");
    me.gold -= 20;
    p.fertilizedAt = now;
    addLog("🧪 " + tr("fertilized"));
    notice(tr("fertilized"));
  }

  if (S.tool === "harvest") {
    if (st !== "ready" && st !== "withered") return;
    const c = CROPS[p.crop];
    const gain = st === "withered" ? Math.floor(c.sell * 0.3) : c.sell;
    me.gold += gain;
    if (st === "ready") me.xp += c.xp;
    clearPlot(p);
    addLog("🌾 " + tr("harvested") + " +" + gain + "🪙");
    notice(tr("harvested"));
  }

  me.updatedAt = now;
  save();
  render();
}

function renderHeader() {
  const me = S.players[S.currentId];
  if (!me) {
    document.getElementById("hdrAvatar").textContent = "🌾";
    document.getElementById("hdrName").textContent = "Guest";
    document.getElementById("hdrLevel").textContent = "Lv.1";
    document.getElementById("hdrGold").textContent = "0";
    document.getElementById("tabMine").classList.remove("active");
    document.getElementById("tabVisit").classList.remove("active");
    document.getElementById("farmTitle").textContent = tr("loginPageTitle");
    document.getElementById("topUsers").innerHTML = "";
    document.getElementById("weather").textContent = "";
    return;
  }
  const info = levelInfo(me.xp);
  document.getElementById("hdrAvatar").textContent = me.avatar;
  document.getElementById("hdrName").textContent = me.name;
  document.getElementById("hdrLevel").textContent = "Lv." + info.level;
  document.getElementById("hdrGold").textContent = String(me.gold);

  const visiting = !!S.viewId && S.viewId !== S.currentId;
  document.getElementById("tabMine").classList.toggle("active", !visiting);
  document.getElementById("tabVisit").classList.toggle("active", visiting);

  const owner = S.players[S.viewId || S.currentId];
  const ft = document.getElementById("farmTitle");
  if (!owner) ft.textContent = tr("title");
  else if (visiting) ft.textContent = tr("farmVisit") + " " + owner.name;
  else ft.textContent = owner.name + tr("farmMine");

  const topUsers = document.getElementById("topUsers");
  topUsers.innerHTML = "";
  const allPlayers = Object.values(S.players)
    .sort((a, b) => (b.xp - a.xp) || (b.gold - a.gold) || a.name.localeCompare(b.name));
  allPlayers.forEach((player, idx) => {
    const row = document.createElement("div");
    const isViewed = (S.viewId || S.currentId) === player.id;
    row.className = "leader-row" + (isViewed ? " on" : "");
    row.innerHTML =
      '<div class="leader-rank">' + (idx === 0 ? '🏆' : '#' + (idx + 1)) + '</div>' +
      '<div class="leader-main"><div class="leader-name">' + player.avatar + ' ' + player.name + '</div><div class="leader-sub">Lv.' + levelInfo(player.xp).level + ' · ' + player.gold + '🪙</div></div>' +

      S.viewId = player.id === S.currentId ? null : player.id;

    });

function friendReady(p) {
  const lim = levelInfo(p.xp).unlocked;
  let r = 0;
  const now = Date.now();
  for (let i = 0; i < lim; i++) if (pState(p.plots[i], now) === "ready") r += 1;
  return r;
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!S.currentId) return;
  const owner = S.players[S.viewId || S.currentId];
  if (!owner) return;
  const now = Date.now();
  const unlocked = levelInfo(owner.xp).unlocked;
  const cols = window.innerWidth <= 780 ? 4 : 5;

  for (let i = 0; i < MAX_PLOTS; i++) {
    const p = owner.plots[i];
    const locked = i >= unlocked;
    const st = locked ? "locked" : pState(p, now);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "plot " + st;

    if (locked) {
      btn.innerHTML = '<div class="plot-icon">🔒</div><div class="plot-time">Lv.</div>';
    } else if (st === "empty") {
      btn.innerHTML = '<div class="plot-icon">🪹</div><div class="plot-time">' + tr("empty") + '</div>';
    } else {
      const icon = st === "withered" ? "🥀" : CROPS[p.crop].icon;
      const badges = (p.wateredAt > p.plantedAt ? "💧" : "") + (p.fertilizedAt > p.plantedAt ? "🧪" : "");
      const contested = Object.values(S.battles).some((b) => b.ownerId === owner.id && b.plotIndex === i && !b.resolved);
      btn.innerHTML =
        (badges ? '<div class="badges">' + badges + '</div>' : "") +
        (contested ? '<div class="plot-badge-battle">⚔️</div>' : "") +
        '<div class="plot-icon">' + icon + '</div>' +
        '<div class="plot-time">' + pLabel(p, now) + '</div>' +
        '<div class="progress"><span style="width:' + Math.floor(pProgress(p, now) * 100) + '%"></span></div>';
    }

    btn.addEventListener("click", () => {
      S.cursor = i;
      actPlot(i);
      renderSelector();
    });

    grid.appendChild(btn);
  }

  if (S.cursor > cols * Math.ceil(MAX_PLOTS / cols) - 1) S.cursor = 0;
  renderSelector();
}

function renderSelector() {
  const sel = document.getElementById("selector");
  const cols = window.innerWidth <= 780 ? 4 : 5;
  const row = Math.floor(S.cursor / cols);
  const col = S.cursor % cols;
  const x = col * (sel.offsetWidth + 8);
  const y = row * (sel.offsetHeight + 8);
  sel.style.transform = "translate(" + x + "px," + y + "px)";
}

function moveCursor(dx, dy) {
  const cols = window.innerWidth <= 780 ? 4 : 5;
  const rows = Math.ceil(MAX_PLOTS / cols);
  let r = Math.floor(S.cursor / cols);
  let c = S.cursor % cols;
  r = (r + dy + rows) % rows;
  c = (c + dx + cols) % cols;
  S.cursor = Math.min(r * cols + c, MAX_PLOTS - 1);
  renderSelector();
}

function setToolByIndex(i) {
  if (i < 0 || i >= TOOLS.length) return;
  S.tool = TOOLS[i];
  save();
  render();
}

function handleCmd(cmdRaw) {
  const cmd = String(cmdRaw || "").trim().toUpperCase();
  if (!cmd) return;
  if (cmd.includes("UP")) dirInput("up");
  else if (cmd.includes("DOWN")) dirInput("down");
  else if (cmd.includes("LEFT")) dirInput("left");
  else if (cmd.includes("RIGHT")) dirInput("right");
  else if (cmd.includes("ACT") || cmd === "A") actInput();
  else if (cmd.includes("TOOL1")) setToolByIndex(0);
  else if (cmd.includes("TOOL2")) setToolByIndex(1);
  else if (cmd.includes("TOOL3")) setToolByIndex(2);
  else if (cmd.includes("TOOL4")) setToolByIndex(3);
}

function decodeBt(v) {
  try { return new TextDecoder().decode(v.buffer).trim(); }
  catch (_) { return ""; }
}

async function connectBluetooth() {
  if (!navigator.bluetooth) return notice(tr("btUnsup"), "err");
  try {
    notice(tr("btConn"), "info");
    btDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb", "battery_service", "device_information"]
    });

    btDevice.addEventListener("gattserverdisconnected", () => {
      btChar = null;
      notice(tr("btDisc"), "err");
      render();
    });

    const server = await btDevice.gatt.connect();
    let service = null;
    try {
      service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
    } catch (_) {
      const services = await server.getPrimaryServices();
      service = services[0] || null;
    }

    if (service) {
      const chars = await service.getCharacteristics();
      btChar = chars[0] || null;
      if (btChar && btChar.properties.notify) {
        await btChar.startNotifications();
        btChar.addEventListener("characteristicvaluechanged", (e) => {
          handleCmd(decodeBt(e.target.value));
        });
      }
    }

    notice(tr("btOk"));
    render();
  } catch (e) {
    console.error(e);
    notice(tr("btFail"), "err");
  }
}

function bindUI() {
  document.getElementById("playerBtn").addEventListener("click", openSwitch);
  document.getElementById("switchClose").addEventListener("click", closeSwitch);
  document.getElementById("switchModal").addEventListener("click", (e) => { if (e.target.id === "switchModal") closeSwitch(); });

  document.getElementById("addBtn").addEventListener("click", openAdd);
  document.getElementById("addCancel").addEventListener("click", closeAdd);
  document.getElementById("addModal").addEventListener("click", (e) => { if (e.target.id === "addModal") closeAdd(); });
  document.getElementById("addConfirm").addEventListener("click", async () => {
    const name = document.getElementById("newName").value.trim();
    const location = document.getElementById("newLocation").value.trim();
    const password = document.getElementById("newPassword").value;
    const av = document.getElementById("newAvatar").value || AVATARS[0];
    if (!name) return;
    if (!location) return;
    if (!password || password.length < 4) return notice(tr("adminTokenTooShort"), "err");
    const exists = Object.values(S.players).some((p) => normalizeName(p.name) === normalizeName(name));
    if (exists) return notice(tr("signupNameExists"), "err");
    const p = makePlayer(name, av, location);
    S.players[p.id] = p;
    S.userAuth.userHashes[p.id] = await sha256Hex(password);
    S.currentId = p.id;
    userUnlockedId = p.id;
    addLog("🆕 " + p.name + " joined");
    closeAdd();
    closeLoginPage();
    save();
    saveAuthSnapshotToCloud();
    render();
    notice(tr("userAuthSetOk"), "info");
  });

  document.getElementById("tabMine").addEventListener("click", () => { S.viewId = null; save(); render(); });
  document.getElementById("tabVisit").addEventListener("click", () => {
    const ids = Object.keys(S.players).filter((id) => id !== S.currentId);
    S.viewId = ids[0] || null;
    save();
    render();
  });

  document.getElementById("btBtn").addEventListener("click", connectBluetooth);
  document.getElementById("adminBtn").addEventListener("click", requestAdminOpen);
  document.getElementById("logoutBtn").addEventListener("click", logoutCurrentUser);

  document.getElementById("loginCreate").addEventListener("click", openAdd);
  document.getElementById("loginSubmit").addEventListener("click", submitLoginPage);
  document.getElementById("loginModal").addEventListener("click", (e) => { if (e.target.id === "loginModal") {} });

  document.getElementById("adminClose").addEventListener("click", closeAdmin);
  document.getElementById("adminModal").addEventListener("click", (e) => { if (e.target.id === "adminModal") closeAdmin(); });
  document.getElementById("adminPlayer").addEventListener("change", adminSyncFields);
  document.getElementById("adminApplyStats").addEventListener("click", adminApplyStats);
  document.getElementById("adminGiveBoost").addEventListener("click", adminBoost);
  document.getElementById("adminFillReady").addEventListener("click", adminFillReady);
  document.getElementById("adminClearPlots").addEventListener("click", adminClearPlots);
  document.getElementById("adminWeatherSunny").addEventListener("click", () => adminSetWeather(0));
  document.getElementById("adminWeatherRain").addEventListener("click", () => adminSetWeather(1));
  document.getElementById("adminWeatherHeat").addEventListener("click", () => adminSetWeather(2));
  document.getElementById("adminWeatherCold").addEventListener("click", () => adminSetWeather(3));
  document.getElementById("adminCloudSave").addEventListener("click", adminSaveCloudCfg);
  document.getElementById("adminCloudSaveAction").addEventListener("click", () => {
    adminReadCloudFields();
    saveToCloud();
  });
  document.getElementById("adminCloudLoadAction").addEventListener("click", () => {
    adminReadCloudFields();
    loadFromCloud();
  });
  document.getElementById("adminCloudTestAction").addEventListener("click", () => {
    adminReadCloudFields();
    testCloudConnection();
  });

  document.getElementById("adminAuthCancel").addEventListener("click", closeAdminAuth);
  document.getElementById("adminAuthModal").addEventListener("click", (e) => { if (e.target.id === "adminAuthModal") closeAdminAuth(); });
  document.getElementById("adminAuthSetup").addEventListener("click", setupAdminToken);
  document.getElementById("adminAuthUnlock").addEventListener("click", unlockAdmin);

  document.getElementById("userAuthCancel").addEventListener("click", closeUserAuth);
  document.getElementById("userAuthModal").addEventListener("click", (e) => { if (e.target.id === "userAuthModal") closeUserAuth(); });
  document.getElementById("userAuthSetup").addEventListener("click", setupUserToken);
  document.getElementById("userAuthUnlock").addEventListener("click", unlockUser);

  window.addEventListener("resize", renderSelector);

  document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "arrowup" || k === "w") dirInput("up");
    if (k === "arrowdown" || k === "s") dirInput("down");
    if (k === "arrowleft" || k === "a") dirInput("left");
    if (k === "arrowright" || k === "d") dirInput("right");
    if (k === " ") { e.preventDefault(); actInput(); }
    if (!isBattleModalOpen()) {
      if (k === "1") setToolByIndex(0);
      if (k === "2") setToolByIndex(1);
      if (k === "3") setToolByIndex(2);
      if (k === "4") setToolByIndex(3);
    }
  });

  document.getElementById("pad").addEventListener("click", (e) => {
    const b = e.target.closest(".pad-btn");
    if (!b) return;
    const act = b.getAttribute("data-act");
    if (act === "left") dirInput("left");
    if (act === "right") dirInput("right");
    if (act === "up") dirInput("up");
    if (act === "down") dirInput("down");
    if (act === "action") actInput();
  });

  document.getElementById("battleGiveUp").addEventListener("click", closeBattleModal);
  document.getElementById("battleModal").addEventListener("click", (e) => { if (e.target.id === "battleModal") closeBattleModal(); });
}

function loop() {
  const now = Date.now();
  weatherTick(now);
  if (S.currentId && S.players[S.currentId]) {
    S.players[S.currentId].lastActiveAt = now;
  }
  resolveRelevantBattles();
  renderHeader();
  renderGrid();
  renderFriends();
  renderBattleBar();
  const heartbeatDue = S.currentId && now - lastHeartbeatPush > BATTLE_HEARTBEAT_MS;
  if (heartbeatDue) lastHeartbeatPush = now;
  save(heartbeatDue);
}

async function boot() {
  load();
  S.lang = "en";
  S.admin.tokenHash = ADMIN_FIXED_HASH;
  if (!S.admin.adminId || !S.players[S.admin.adminId]) {
    S.admin.adminId = S.currentId;
  }
  saveAdminAuthLocal();
  bindUI();
  if ((S.cloud.url || "").trim()) {
    await loadFromCloud();
  }
  render();
  openLoginPage();
  setInterval(loop, 1000);
  scheduleCloudPoll();
}

boot();
