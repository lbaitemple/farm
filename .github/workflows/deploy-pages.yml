name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from repo secrets
        run: |
          cat > config.js <<EOF
          window.CLOUD_CONFIG = {
            url: "${CLOUD_URL}",
            token: "${CLOUD_TOKEN}",
            gameId: "qqfarm_default"
          };
          EOF
        env:
          CLOUD_URL: ${{ secrets.CLOUD_URL }}
          CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
